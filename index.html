<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOBBY -->
    <div id="lobby" class="page-card">
        <div class="lobby-header">
            <div class="lobby-icon">💬</div>
            <div>
                <h2>WebRTC Chat</h2>
                <div class="lobby-subtitle">Peer-to-peer · cifrado · sin servidor</div>
            </div>
        </div>
        <div id="channels-list">
            <div class="channels-label">Canales activos</div>
            <div id="no-channels">Cargando canales...</div>
        </div>
        <div class="join-row">
            <input id="channel-input" value="default" placeholder="nombre del canal">
            <button class="action" id="btn-join-channel">Entrar</button>
        </div>
    </div>

    <!-- ROOM -->
    <div id="room-view" hidden>
        <div id="room-header">
            <span id="room-title"></span>
            <span id="room-status">conectando...</span>
            <button class="action secondary" id="btn-leave">← Salir</button>
        </div>

        <section class="app-module" data-module="game">
            <button class="app-module-header" type="button" aria-expanded="true" aria-controls="game-module-body">
                <span>
                    <span class="app-module-title">Juego</span>
                    <span class="app-module-subtitle">Arena multijugador</span>
                </span>
                <span class="app-module-toggle">
                    <span class="app-module-toggle-text">Ocultar</span>
                    <span class="app-module-chevron">⌄</span>
                </span>
            </button>
            <div class="app-module-body" id="game-module-body">
                <div id="game-container"></div>
            </div>
        </section>

        <section class="app-module" data-module="chat">
            <button class="app-module-header" type="button" aria-expanded="true" aria-controls="chat-module-body">
                <span>
                    <span class="app-module-title">Chat</span>
                    <span class="app-module-subtitle">Mensajes del canal</span>
                </span>
                <span class="app-module-toggle">
                    <span class="app-module-toggle-text">Ocultar</span>
                    <span class="app-module-chevron">⌄</span>
                </span>
            </button>
            <div class="app-module-body chat-module-body" id="chat-module-body">
                <pre id="log"></pre>
                <div class="send-row">
                    <input id="msg" placeholder="Escribí un mensaje…">
                    <button class="action" id="btn-send">Enviar</button>
                </div>
            </div>
        </section>

        <section class="app-module" data-module="camera">
            <button class="app-module-header" type="button" aria-expanded="true" aria-controls="media-module-body">
                <span>
                    <span class="app-module-title">Cámara</span>
                    <span class="app-module-subtitle">Video y micrófono</span>
                </span>
                <span class="app-module-toggle">
                    <span class="app-module-toggle-text">Ocultar</span>
                    <span class="app-module-chevron">⌄</span>
                </span>
            </button>
            <div class="app-module-body" id="media-module-body">
                <div id="media-container"></div>
            </div>
        </section>

        <section class="app-module" data-module="drawing">
            <button class="app-module-header" type="button" aria-expanded="true" aria-controls="drawing-module-body">
                <span>
                    <span class="app-module-title">Dibujo</span>
                    <span class="app-module-subtitle">Canvas colaborativo</span>
                </span>
                <span class="app-module-toggle">
                    <span class="app-module-toggle-text">Ocultar</span>
                    <span class="app-module-chevron">⌄</span>
                </span>
            </button>
            <div class="app-module-body" id="drawing-module-body">
                <div id="drawing-container"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { App } from "./app.js";

        new App();
    </script>

</body>
</html>
